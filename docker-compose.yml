services:
  taskboard:
    build: .
    container_name: taskboard-mcp
    restart: unless-stopped
    ports:
      - "7438:7438"
    volumes:
      - ~/.taskboard:/root/.taskboard
    environment:
      - TASKBOARD_DB=/root/.taskboard/taskboard.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7438/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
