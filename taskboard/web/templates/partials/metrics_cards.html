{# metrics_cards.html — 4 metric cards fragment (HTMX partial, no extends) #}
<section class="metrics-cards">
    <div class="card metric-card">
        <h3>Total Tasks</h3>
        <p class="metric-value">{{ metrics.total_tasks }}</p>
    </div>
    <div class="card metric-card">
        <h3>Completed</h3>
        <p class="metric-value">{{ metrics.completed }}</p>
    </div>
    <div class="card metric-card">
        <h3>Pending</h3>
        <p class="metric-value">{{ metrics.pending }}</p>
    </div>
    <div class="card metric-card">
        <h3>Completion Rate</h3>
        <p class="metric-value">{{ metrics.completion_rate }}%</p>
    </div>
</section>
