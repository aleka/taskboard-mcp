{# task_row.html — Single task table row fragment (HTMX partial) #}
<tr class="task-row" id="task-{{ task.task_id }}">
    <td>
        <a href="/projects/{{ task.project_name }}">{{ task.task_id }}</a>
    </td>
    <td>{{ task.title }}</td>
    <td>{{ task.type }}</td>
    <td>
        <span class="badge badge-{{ task.status }}">{{ task.status }}</span>
    </td>
    <td>{{ task.priority }}</td>
    <td>{{ task.created_at }}</td>
    <td>{{ task.completed_at or "—" }}</td>
    <td class="actions-cell">
        {% if task.status != 'done' %}
        <button
            class="btn btn-success btn-xs"
            hx-post="/actions/tasks/{{ task.task_id }}/complete"
            hx-target="#task-{{ task.task_id }}"
            hx-swap="outerHTML"
        >✓</button>
        {% endif %}
        {% if task.status == 'todo' %}
        <button
            class="btn btn-secondary btn-xs"
            hx-post="/actions/tasks/{{ task.task_id }}/status"
            hx-vals='{"status": "in_progress"}'
            hx-target="#task-{{ task.task_id }}"
            hx-swap="outerHTML"
        >▶</button>
        {% endif %}
    </td>
</tr>
